@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&display=swap');
.sd-root {
  --bg:#0B0A12; --surface:#171423; --surface2:#201C31; --border:#2C2843;
  --text:#EDEAF6; --muted:#8B86A3; --accent:#A78BFA;
  min-height:100vh; background:var(--bg); color:var(--text);
  font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
  display:flex; justify-content:center;
}
.sd-root * { box-sizing:border-box; }
.sd-phone { width:100%; max-width:430px; min-height:100vh; padding:20px 18px 32px; position:relative; overflow:hidden; }
.sd-eyebrow { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); font-weight:700; }
.sd-h1 { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:32px; margin:4px 0 2px; }
.sd-sub { color:var(--muted); font-size:14px; margin-bottom:22px; }
.sd-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:16px; margin-bottom:14px; }
.sd-card h3 { font-family:'Bricolage Grotesque',sans-serif; font-size:20px; font-weight:700; margin:0 0 2px; }
.sd-card .author { color:var(--muted); font-size:13px; }
.sd-tag { display:inline-block; font-size:11px; color:var(--accent); background:rgba(167,139,250,0.12); border-radius:99px; padding:3px 10px; margin-top:8px; }
.sd-row { display:flex; gap:10px; }
.sd-btn { appearance:none; border:1px solid var(--border); background:var(--surface2); color:var(--text);
  border-radius:12px; padding:10px 14px; font-size:14px; font-weight:600; cursor:pointer; }
.sd-btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
.sd-btn.primary { background:var(--accent); border-color:var(--accent); color:#17102E; }
.sd-btn.ghost { background:transparent; }
.sd-btn.danger { color:#FF8A80; }
.sd-btn.full { width:100%; }
.sd-back { background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:0; margin-bottom:14px; }
.sd-back:focus-visible { outline:2px solid var(--accent); border-radius:4px; }
.sd-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px;
  color:var(--text); padding:10px 12px; font-size:14px; margin-top:4px; }
.sd-input:focus-visible { outline:2px solid var(--accent); }
.sd-label { font-size:12px; color:var(--muted); display:block; margin-top:12px; }
.sd-caps { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); font-weight:700; display:block; margin:16px 0 8px; }
.sd-moodrow { display:flex; align-items:center; gap:12px; padding:12px; border-radius:14px;
  background:var(--surface2); border:1px solid var(--border); margin-bottom:10px; cursor:pointer; width:100%; text-align:left; color:var(--text); }
.sd-moodrow:focus-visible { outline:2px solid var(--accent); }
.sd-moodrow .em { font-size:22px; }
.sd-moodrow .nm { font-weight:600; font-size:15px; }
.sd-moodrow .vb { font-size:12px; color:var(--muted); }
.sd-swatches { display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
.sd-swatch { width:28px; height:28px; border-radius:99px; border:2px solid transparent; cursor:pointer; }
.sd-swatch.on { border-color:#fff; }
.sd-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:18px; }
.sd-mood { position:relative; border-radius:20px; border:1px solid var(--border);
  padding:22px 14px 18px; text-align:center; cursor:pointer; color:var(--text);
  user-select:none; -webkit-user-select:none;
  transition:transform .12s ease, box-shadow .3s ease, border-color .3s ease; }
.sd-mood:active { transform:scale(0.96); }
.sd-mood:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
.sd-mood .em { font-size:42px; display:block; margin-bottom:8px; }
.sd-mood .nm { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:13.5px;
  text-transform:uppercase; letter-spacing:0.06em; }
.sd-mood .tk { display:block; font-size:10px; color:var(--muted); margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sd-mood.active { border-color:var(--mc); box-shadow:0 0 26px -4px var(--mc); }
@media (prefers-reduced-motion: no-preference) {
  .sd-mood.active { animation:sdcard 2s ease-in-out infinite; }
  @keyframes sdcard {
    0%,100% { box-shadow:0 0 20px -6px var(--mc); transform:scale(1); }
    50% { box-shadow:0 0 34px -2px var(--mc); transform:scale(1.02); }
  }
}
.sd-banner { margin-top:16px; border:1px solid var(--border); border-radius:22px; padding:18px 16px 14px;
  text-align:center; background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01)); }
.sd-banner .bem { font-size:46px; display:block; }
.sd-banner .bname { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:22px;
  text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; }
.sd-banner .bstatus { color:var(--muted); font-size:13px; margin-top:4px; }
.sd-banner.hasq { display:flex; align-items:center; gap:14px; text-align:left; }
.sd-banner.hasq .bmain { flex:1; text-align:center; min-width:0; }
.sd-upnext { width:38%; flex-shrink:0; }
.uxlbl { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:6px; }
.uxchip { display:block; width:100%; text-align:left; font-size:11.5px; font-weight:600;
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  border-radius:10px; padding:6px 9px; margin-bottom:6px; cursor:pointer;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.uxchip:focus-visible { outline:2px solid var(--accent); }
.uxchip.fade { opacity:0.45; }
.uxmore { font-size:10.5px; color:var(--muted); }
.sd-qadd { position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:99px;
  border:1px solid var(--border); background:rgba(11,10,18,0.5); color:var(--muted);
  font-size:15px; line-height:1; cursor:pointer; z-index:1; }
.sd-qadd:focus-visible { outline:2px solid var(--accent); }
.sd-eq { display:flex; gap:4px; justify-content:center; align-items:flex-end; height:16px; margin-top:10px; }
.sd-eq span { width:4px; height:7px; background:var(--mc); border-radius:2px; }
.sd-eq.off span { height:4px; opacity:0.35; }
@media (prefers-reduced-motion: no-preference) {
  .sd-eq:not(.off) span { animation:sdeq 0.8s ease-in-out infinite alternate; }
  .sd-eq span:nth-child(2) { animation-delay:-0.55s; }
  .sd-eq span:nth-child(3) { animation-delay:-0.3s; }
  .sd-eq span:nth-child(4) { animation-delay:-0.7s; }
  .sd-eq span:nth-child(5) { animation-delay:-0.15s; }
  @keyframes sdeq { from { height:4px; } to { height:16px; } }
}
.sd-bottom { position:sticky; bottom:0; margin-top:20px; background:rgba(11,10,18,0.85); backdrop-filter:blur(8px);
  border:1px solid var(--border); border-radius:18px; padding:12px 14px; }
.sd-seg { display:flex; background:var(--surface2); border-radius:10px; padding:3px; margin-top:10px; }
.sd-seg button { flex:1; border:none; background:transparent; color:var(--muted); font-size:12px; font-weight:600;
  padding:7px 4px; border-radius:8px; cursor:pointer; white-space:nowrap; }
.sd-seg button.on { background:var(--accent); color:#17102E; }
.sd-vol { width:100%; margin-top:12px; accent-color:var(--accent); }
.sd-hint { font-size:11.5px; color:var(--muted); margin-top:14px; line-height:1.5; }
.sd-file input { display:none; }
.sd-filename { font-size:12px; color:var(--accent); margin-top:8px; word-break:break-all; }
.sd-session { text-align:center; font-size:12px; color:var(--muted); margin-top:14px; }
.sd-sleep { display:flex; align-items:center; gap:6px; margin-top:10px; }
.sd-sleep .lbl { font-size:12px; color:var(--muted); margin-right:2px; }
.sd-sleep button { border:1px solid var(--border); background:var(--surface2); color:var(--muted);
  border-radius:99px; padding:5px 10px; font-size:12px; font-weight:700; cursor:pointer; }
.sd-sleep button.on { background:var(--accent); border-color:var(--accent); color:#17102E; }
.sd-sleep .left { font-size:12px; color:var(--accent); margin-left:auto; font-variant-numeric:tabular-nums; }
.sd-glow { position:absolute; inset:-40%; pointer-events:none; transition:background 1.2s ease; z-index:0; }
.sd-content { position:relative; z-index:1; }
.sd-err { background:#3A1420; border:1px solid #FF5A4E; color:#FFB4AC; border-radius:12px;
  padding:10px 14px; font-size:13px; margin-bottom:14px; position:relative; z-index:2; }
.sd-blobs span { position:absolute; border-radius:50%; filter:blur(70px); opacity:0.28; z-index:0; pointer-events:none; }
.sd-blobs span:nth-child(1) { width:280px; height:280px; background:#7C3AED; top:-90px; left:-70px; }
.sd-blobs span:nth-child(2) { width:220px; height:220px; background:#FF7AB8; top:180px; right:-90px; }
.sd-blobs span:nth-child(3) { width:240px; height:240px; background:#3FC9B8; bottom:-60px; left:20px; }
@media (prefers-reduced-motion: no-preference) {
  .sd-blobs span { animation:sdfloat 14s ease-in-out infinite alternate; }
  .sd-blobs span:nth-child(2) { animation-delay:-5s; }
  .sd-blobs span:nth-child(3) { animation-delay:-9s; }
  @keyframes sdfloat { from { transform:translate(0,0) scale(1); } to { transform:translate(24px,-20px) scale(1.12); } }
}
.sd-wordmark { background:linear-gradient(92deg,#A78BFA 10%,#FF7AB8 55%,#FFC94D 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent; }
.sd-bookcard { position:relative; border-radius:28px; padding:18px; margin-bottom:18px;
  background:linear-gradient(var(--surface),var(--surface)) padding-box,
             linear-gradient(135deg,var(--g1),var(--g2)) border-box;
  border:1.5px solid transparent; }
.sd-bookcard h3 { font-family:'Bricolage Grotesque',sans-serif; font-size:20px; font-weight:800; margin:0 0 2px; }
.sd-bookcard .author { color:var(--muted); font-size:13px; }
.sd-bookhead { display:flex; gap:14px; align-items:center; margin-bottom:6px; }
.sd-cover { width:58px; height:58px; flex-shrink:0; border-radius:20px; font-size:30px;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,var(--g1),var(--g2)); box-shadow:0 6px 18px -8px var(--g1); }
.sd-coverimg { width:58px; height:80px; object-fit:cover; border-radius:12px; flex-shrink:0;
  box-shadow:0 6px 18px -8px var(--g1); }
.sd-newbook { width:100%; border:2px dashed var(--border); background:transparent; color:var(--muted);
  border-radius:28px; padding:20px; font-size:15px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:10px; }
.sd-newbook:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
.sd-newbook .plus { font-size:24px; color:var(--accent); }
.sd-deckmod { display:flex; align-items:center; gap:10px; width:100%; margin-top:12px;
  background:var(--surface2); border:1px solid var(--border); border-radius:14px;
  padding:12px; color:var(--text); cursor:pointer; text-align:left; }
.sd-deckmod:focus-visible { outline:2px solid var(--accent); }
.sd-deckmod .dmicon { font-size:20px; }
.sd-deckmod .dmtitle { display:block; font-size:14px; font-weight:700; }
.sd-deckmod .dmsub { display:block; font-size:12px; color:var(--muted);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sd-deckmod .dmchev { color:var(--muted); font-size:20px; margin-left:auto; }
.sd-status { margin-top:10px; font-size:13px; color:var(--muted); }
.sd-catchips { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
.sd-catchips button { border:1px solid var(--border); background:var(--surface2); color:var(--muted);
  border-radius:99px; padding:7px 14px; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap; }
.sd-catchips button.on { background:var(--accent); border-color:var(--accent); color:#17102E; }
.sd-fan { position:relative; height:232px; display:flex; align-items:center; justify-content:center;
  margin-top:14px; touch-action:pan-y; }
.sd-fcard { position:absolute; width:142px; height:198px; border-radius:18px;
  border:1.5px solid var(--mc); display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:8px; cursor:pointer; user-select:none; -webkit-user-select:none;
  transition:transform .35s ease, opacity .35s ease, box-shadow .35s ease; }
.sd-fcard.sel { box-shadow:0 0 32px -6px var(--mc); }
.sd-fcard .fem { font-size:44px; }
.sd-fcard .fnm { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:14px;
  text-transform:uppercase; letter-spacing:0.05em; text-align:center; padding:0 10px; }
.sd-fcard .fcat { font-size:10px; font-weight:800; color:#17102E; border-radius:99px; padding:3px 9px;
  text-transform:uppercase; letter-spacing:0.06em; }
.sd-fandots { display:flex; align-items:center; gap:5px; justify-content:center; margin:10px 0 4px; }
.sd-fandots span { width:6px; height:6px; border-radius:99px; background:var(--border); }
.sd-fandots span.on { background:var(--accent); }
.sd-fandots .cnt { width:auto; height:auto; background:none; font-size:11px; color:var(--muted); margin-left:8px; }
.sd-selhead { display:flex; align-items:center; gap:12px; margin-top:12px; }
.sd-selhead .sh-emoji { font-size:26px; }
.sd-selhead b { font-family:'Bricolage Grotesque',sans-serif; font-size:17px; }
.sd-tracks { border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.sd-trow { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--surface);
  border-bottom:1px solid var(--border); cursor:pointer; }
.sd-trow:last-child { border-bottom:none; }
.sd-trow.on { background:rgba(167,139,250,0.12); }
.sd-trow:focus-visible { outline:2px solid var(--accent); outline-offset:-2px; }
.sd-trow .tinfo { flex:1; min-width:0; }
.sd-trow .tname { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sd-trow .tsrc { font-size:11.5px; color:var(--muted); }
.sd-trow .tsel { font-size:11px; font-weight:800; color:var(--accent); white-space:nowrap; }
.tplay { border:1px solid var(--border); background:var(--surface2); color:var(--text);
  border-radius:99px; width:32px; height:32px; font-size:12px; cursor:pointer; flex-shrink:0; }
.tplay:focus-visible { outline:2px solid var(--accent); }
.tplay.playing { background:var(--accent); border-color:var(--accent); color:#17102E; }
.sd-trem { border:none; background:none; color:#FF8A80; font-size:15px; cursor:pointer; padding:4px; }
